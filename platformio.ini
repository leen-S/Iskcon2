[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/RTClib @ ^2.1.4

build_flags =
    -O2
    -DCORE_DEBUG_LEVEL=0

upload_speed   = 921600
monitor_speed  = 115200